# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid ranker combining an offline lexical-semantic retrieval signal with a
  structured, explainable fit-scoring engine and a behavioural-availability
  modifier. The core idea is evidence weighting: a concept found inside a real
  career-history description or job title counts far more than the same word in
  a self-asserted skills tag, which is what defeats keyword-stuffing. Six
  positive components (semantic similarity, core-concept evidence, title/role,
  production signal, experience band, location) are combined, then reduced by
  stated-negative penalties (services-only careers, CV/speech without NLP/IR,
  research-only, title-chasing) and multiplied by a behavioural modifier
  (recruiter response rate, recency, open-to-work, notice period). Arithmetic-
  impossible honeypot profiles are detected and forced to the bottom. Runs
  CPU-only with no network in under a minute on the full 100K pool.

